name: adico_nav
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python ──────────────────────────────────
  - python=3.9.18

  # ── PyTorch (must match ADiCo training env) ─
  # RTX 2060 compute 7.5 supports CUDA 11.7
  - pytorch=1.13.1
  - torchvision=0.14.1
  - torchaudio=0.13.1
  - pytorch-cuda=11.7

  # ── Core scientific ─────────────────────────
  - numpy<2.0           # ADiCo requirement
  - scipy
  - matplotlib

  # ── OpenCV (real-mode perception) ───────────
  - opencv=4.8.*

  # ── YAML / config ───────────────────────────
  - pyyaml
  - omegaconf
  - hydra-core=1.3.*

  # ── Pip installs (custom forks + packages) ──
  - pip:
    # ── ADiCo custom forks (pinned to training branches) ──
    - git+https://github.com/Svar7769/AD2C-Diversity-Testing.git@master

    # BenchMARL custom fork (must match training)
    # TODO: replace URL with the exact fork used during training
    - benchmarl

    # TorchRL (BenchMARL dependency)
    - torchrl==0.1.1

    # VMAS (must match training fork)
    - vmas

    # TensorDict
    - tensordict==0.1.1

    # ── Navigation runtime ───────────────────
    - pydantic>=2.0
    - asyncio-mqtt          # optional, for future telemetry

    # ── ROS2 Python bridge (sourced from apt, not pip)
    # Do NOT install rclpy via pip – source /opt/ros/jazzy/setup.bash instead
